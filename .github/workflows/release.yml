name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package and publish"
        required: true
        default: "v0.9.4"

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:check
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: "*.vsix"
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: pnpm exec vsce publish --packagePath ./*.vsix --pat "$VSCE_PAT"
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: |
          set -euo pipefail
          namespace="alexdotpink"

          set +e
          namespace_output="$(pnpm dlx ovsx create-namespace "$namespace" -p "$OVSX_PAT" 2>&1)"
          namespace_status=$?
          set -e

          printf '%s\n' "$namespace_output"
          if [ "$namespace_status" -ne 0 ] && ! printf '%s\n' "$namespace_output" | grep -qiE 'already exists|already.*namespace|namespace.*already'; then
            exit "$namespace_status"
          fi

          pnpm dlx ovsx verify-pat "$namespace" -p "$OVSX_PAT"
          pnpm dlx ovsx publish ./*.vsix -p "$OVSX_PAT"
